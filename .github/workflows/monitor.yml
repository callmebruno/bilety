name: Monitor cen Ryanair

on:
  schedule:
    - cron: '*/15 * * * *'   # co 15 minut
  workflow_dispatch:
    inputs:
      force:
        description: 'Wyślij email niezależnie od zmiany ceny'
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Sprawdź cenę
        run: python monitor.py ${{ inputs.force && '--force' || '' }}
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

      - name: Zapisz zaktualizowane ceny do repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices [skip ci]"
          git push
